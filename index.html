<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="icon" type="image/png" sizes="32x32" href="https://img.icons8.com/fluent/32/000000/open-book.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://img.icons8.com/fluent/192/000000/open-book.png">
    <link rel="icon" type="image/png" sizes="192x192" href="https://img.icons8.com/fluent/192/000000/open-book.png">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4a2874">

    <title>Discurso Público</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        body { background-color: #121214; color: #e1e1e6; display: flex; justify-content: center; min-height: 100vh; padding-bottom: 80px; }
        .phone-container { width: 100%; max-width: 480px; min-height: 100vh; background-color: #1a1a1e; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.6); }
        .app-header { background-color: #4a2874; color: #ffffff; padding: 16px; text-align: center; font-size: 18px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
        .app-content { padding: 14px; display: flex; flex-direction: column; gap: 12px; flex: 1; }
        .card { background-color: #202024; border-radius: 14px; padding: 14px; border: 1px solid #29292e; }
        .date-card { display: flex; justify-content: space-between; align-items: center; font-size: 18px; font-weight: bold; color: #ffffff; }
        .speaker-profile { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background-color: #323238; display: flex; align-items: center; justify-content: center; border: 2px solid #4a2874; }
        .avatar svg { width: 30px; height: 30px; fill: #7c7c8a; }
        .speaker-info-text .label { font-size: 11px; color: #96969a; text-transform: uppercase; }
        .speaker-info-text .name { font-size: 18px; font-weight: bold; color: #ffffff; }
        .divider { height: 1px; background-color: #29292e; margin: 10px 0; }
        .info-row .label { font-size: 11px; color: #8d8d99; }
        .info-row .value { font-size: 14px; color: #e1e1e6; font-weight: 500; }
        .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .meta-grid .meta-item { background-color: #29292e; padding: 8px 10px; border-radius: 8px; display: flex; align-items: center; gap: 8px; }
        .meta-grid .meta-item.active-local { border-left: 3px solid #04d361; }
        .meta-item-text .label { font-size: 10px; color: #8d8d99; }
        .meta-item-text .value { font-size: 13px; font-weight: bold; color: #ffffff; }
        .theme-title { font-size: 15px; font-weight: 600; color: #ffffff; line-height: 1.4; margin-bottom: 8px; }
        .selectors-container { display: flex; flex-direction: column; gap: 8px; }
        .selector-field { display: flex; justify-content: space-between; align-items: center; background-color: #29292e; padding: 10px 12px; border-radius: 8px; border: 1px solid transparent; }
        .selector-field.confirmed { background-color: rgba(4, 211, 97, 0.12); border: 1px solid #04d361; }
        .selector-label { font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background-color: #50505a; }
        .selector-field.confirmed .status-dot { background-color: #04d361; box-shadow: 0 0 6px #04d361; }
        select { background: #1a1a1e; border: 1px solid #323238; color: #ffffff; font-size: 13px; font-weight: bold; padding: 4px 8px; border-radius: 6px; outline: none; }
        .actions-container { display: flex; flex-direction: column; gap: 8px; }
        .action-btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { padding: 12px; border-radius: 10px; border: none; font-size: 13px; font-weight: bold; color: white; display: flex; align-items: center; justify-content: space-between; cursor: pointer; text-decoration: none; }
        .btn-solicitar { background-color: #633bbc; }
        .btn-compartir { background-color: #12a454; }
        .btn-directo { background-color: #494d4b; }
        .btn-status-pill { font-size: 10px; padding: 2px 6px; border-radius: 4px; background-color: rgba(255,255,255,0.15); font-weight: normal; }
        .btn.completed { opacity: 0.4; }
        #loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #121214; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 16px; font-weight: bold; z-index: 100; gap: 10px; }
        .offline-badge { background-color: #d97706; color: white; padding: 4px 8px; font-size: 11px; border-radius: 4px; display: none; font-weight: bold; }

        /* Notificación Flotante Estilo Toast */
        .toast-offline {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(150px);
            background-color: #d97706;
            color: #ffffff;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 90%;
            max-width: 420px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast-offline.show { transform: translateX(-50%) translateY(0); }
        .toast-icon { font-size: 20px; }
    </style>
</head>
<body>

<div id="loading">
    <span>Cargando datos del sistema...</span>
    <span id="offline-notice" style="font-size:12px; color:#8d8d99; display:none;">Cargando copia local sin conexión</span>
</div>

<div class="phone-container">
    <div class="app-header">
        <span> 📖 </span>
        <span>Discurso Público</span>
        <span class="offline-badge" id="badge-offline">MODO LOCAL</span>
    </div>

    <div class="app-content">
        <div class="card date-card">
            <span id="txt-fecha">...</span>
            <span style="color:#7c7c8a;">📅</span>
        </div>

        <div class="card">
            <div class="speaker-profile">
                <div class="avatar">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z"/></svg>
                </div>
                <div class="speaker-info-text">
                    <div class="label">Orador</div>
                    <div class="name" id="txt-orador">...</div>
                </div>
            </div>
            <div class="divider"></div>
            <div class="info-row">
                <div class="label">Congregación</div>
                <div class="value" id="txt-congregacion">...</div>
            </div>
            <div class="meta-grid">
                <div class="meta-item active-local">
                    <span>✅</span>
                    <div class="meta-item-text">
                        <div class="label">Hospitalidad</div>
                        <div class="value" id="txt-hospitalidad">...</div>
                    </div>
                </div>
                <div class="meta-item">
                    <span>👥</span>
                    <div class="meta-item-text">
                        <div class="label">Grupo</div>
                        <div class="value" id="txt-grupo">...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="theme-title" id="txt-discurso">...</div>
            <div class="selectors-container">
                <div class="selector-field" id="field-C6">
                    <div class="selector-label"><div class="status-dot"></div><span>Oración Inicial</span></div>
                    <select id="select-C6" onchange="guardarCelda('C6', this.value)">
                        <option value="">-- Vacío --</option>
                    </select>
                </div>
                <div class="selector-field" id="field-E6">
                    <div class="selector-label"><div class="status-dot"></div><span>Imágenes</span></div>
                    <select id="select-E6" onchange="guardarCelda('E6', this.value)">
                        <option value="">-- Vacío --</option>
                    </select>
                </div>
                <div class="selector-field" id="field-G6">
                    <div class="selector-label"><div class="status-dot"></div><span>Canción</span></div>
                    <select id="select-G6" onchange="guardarCelda('G6', this.value)">
                        <option value="">-- Vacío --</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="actions-container">
            <div class="action-btn-row">
                <button class="btn btn-solicitar" id="btn-C11" onclick="ejecutarAccionBoton('C11', 'B11')">
                    <span>📩 Solicitar Datos</span>
                    <span class="btn-status-pill" id="pill-C11">Pendiente</span>
                </button>
                <button class="btn btn-compartir" id="btn-C12" onclick="ejecutarAccionBoton('C12', 'B12')">
                    <span>📢 Compartir Datos</span>
                    <span class="btn-status-pill" id="pill-C12">Pendiente</span>
                </button>
            </div>
            <button class="btn btn-directo" id="btn-F11" onclick="ejecutarAccionBoton('F11', 'E11')">
                <span>👤 Directo al Orador</span>
                <span class="btn-status-pill" id="pill-F11">Pendiente</span>
            </button>
        </div>
    </div>
</div>

<div id="offline-toast" class="toast-offline">
    <span class="toast-icon">⚠️</span>
    <span>Sin conexión. Los cambios se guardarán localmente y se sincronizarán al recuperar la red.</span>
</div>

<script>
    let urlsWhatsApp = {};
    const URL_API_GOOGLE = "https://script.google.com/macros/s/AKfycbzRQDPqLH2Laaz3oxY1IuZH3bONXDRevXI3o3wW6w6eR4BebWubd8SGP0cVvAqVW4fg1w/exec";

    window.onload = function() {
        consultarBaseDeDatos();
        
        // Listeners nativos para controlar la burbuja flotante y sincronización automática
        window.addEventListener('online', () => {
            document.getElementById('offline-toast').classList.remove('show');
            document.getElementById('badge-offline').style.display = 'none';
            procesarBuzonDeSalida(); 
        });
        
        window.addEventListener('offline', () => {
            document.getElementById('offline-toast').classList.add('show');
            document.getElementById('badge-offline').style.display = 'block';
        });
    };

    /**
     * 🧱 BLOQUE 1: EL CONECTOR ASÍNCRONO + CACHÉ COPIA LOCAL (OFFLINE)
     */
    async function consultarBaseDeDatos() {
        try {
            const respuesta = await fetch(URL_API_GOOGLE);
            const datosRecibidos = await respuesta.json();
            
            localStorage.setItem("respaldo_discursos", JSON.stringify(datosRecibidos));
            
            actualizarPantallaVisual(datosRecibidos);
            
        } catch (error) {
            console.warn("Ejecutando en modo Offline.");
            if(!navigator.onLine) {
                document.getElementById('offline-toast').classList.add('show');
                document.getElementById('badge-offline').style.display = 'block';
            }
            
            const respaldoLocal = localStorage.getItem("respaldo_discursos");
            if (respaldoLocal) {
                document.getElementById('offline-notice').style.display = 'block';
                actualizarPantallaVisual(JSON.parse(respaldoLocal));
            } else {
                document.getElementById('loading').innerText = "Sin conexión y sin datos locales guardados.";
            }
        }
    }

    /**
     * 🧱 BLOQUE 2: EL PINTOR VISUAL (REPRESENTACIÓN DE DATOS)
     */
    function actualizarPantallaVisual(data) {
        document.getElementById('loading').style.display = 'none';
        
        document.getElementById('txt-fecha').innerText = data.D3;
        document.getElementById('txt-orador').innerText = data.D4;
        document.getElementById('txt-discurso').innerText = data.D5;
        document.getElementById('txt-congregacion').innerText = data.D7;
        document.getElementById('txt-hospitalidad').innerText = data.D8;
        document.getElementById('txt-grupo').innerText = data.D9;

        urlsWhatsApp['C11'] = data.C11_url;
        urlsWhatsApp['C12'] = data.C12_url;
        urlsWhatsApp['F11'] = data.F11_url;

        poblarDesplegable('C6', data.C6_opciones, data.C6_valor);
        poblarDesplegable('E6', data.E6_opciones, data.E6_valor);
        poblarDesplegable('G6', data.G6_opciones, data.G6_valor);

        verificarEstadoBoton('C11', data.B11_check);
        verificarEstadoBoton('C12', data.B12_check);
        verificarEstadoBoton('F11', data.E11_check);
    }

    /**
     * 🧱 BLOQUE 3: EL INTERRUPTOR INTELIGENTE (ESTILOS Y FORMATO)
     */
    function verificarEstadoBoton(idBoton, estaMarcado) {
        const boton = document.getElementById('btn-' + idBoton);
        const etiqueta = document.getElementById('pill-' + idBoton);
        
        if (estaMarcado === true || estaMarcado === "TRUE") {
            etiqueta.innerText = "Enviado ✓";
            boton.classList.add('completed');
        } else {
            etiqueta.innerText = "Pendiente";
            boton.classList.remove('completed');
        }
    }

    function poblarDesplegable(idCelda, opciones, valorActual) {
        const select = document.getElementById('select-' + idCelda);
        select.innerHTML = '<option value="">-- Vacío --</option>';
        opciones.forEach(opt => {
            if(opt.trim() !== "") {
                let option = document.createElement('option');
                option.value = opt; option.text = opt;
                if(opt === valorActual) option.selected = true;
                select.appendChild(option);
            }
        });
        const field = document.getElementById('field-' + idCelda);
        if (valorActual && valorActual.trim() !== "") { field.classList.add('confirmed'); } else { field.classList.remove('confirmed'); }
    }

    /**
     * 🧱 BLOQUE 4: ACCIÓN DE DOBLE PROPÓSITO (DISPARADOR)
     */
    function ejecutarAccionBoton(idBoton, celdaCheckbox) {
        const url = urlsWhatsApp[idBoton];
        if (url) {
            window.open(url, '_blank');
            enviarCambioAGoogle(celdaCheckbox, "true");
            verificarEstadoBoton(idBoton, true);
        }
    }

    function guardarCelda(celda, valor) {
        const field = document.getElementById('field-' + celda);
        if (valor && valor.trim() !== "") { field.classList.add('confirmed'); } else { field.classList.remove('confirmed'); }
        enviarCambioAGoogle(celda, valor);
    }

    /**
     * 🧱 BLOQUE 5: EL MENSAJERO Y EL BUZÓN DE SALIDA (SINCRONIZADOR OFFLINE)
     */
    function enviarCambioAGoogle(celdaAEditar, nuevoValor) {
        const orden = { celda: celdaAEditar, valor: nuevoValor };
        let buzonEspera = JSON.parse(localStorage.getItem("buzon_offline")) || [];
        buzonEspera.push(orden);
        localStorage.setItem("buzon_offline", JSON.stringify(buzonEspera));

        procesarBuzonDeSalida();
    }

    async function procesarBuzonDeSalida() {
        if (!navigator.onLine) return;

        let buzonEspera = JSON.parse(localStorage.getItem("buzon_offline")) || [];
        if (buzonEspera.length === 0) return;

        while (buzonEspera.length > 0) {
            const ordenActual = buzonEspera[0];
            
            try {
                await fetch(`${URL_API_GOOGLE}?celda=${ordenActual.celda}&valor=${encodeURIComponent(ordenActual.valor)}`, {
                    method: 'POST'
                });
                
                buzonEspera.shift();
                localStorage.setItem("buzon_offline", JSON.stringify(buzonEspera));
                
            } catch (error) {
                console.error("Fallo de red al sincronizar tarea diferida.", error);
                break; 
            }
        }
    }
</script>
</body>
</html>
